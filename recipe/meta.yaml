{% set name = "python-graphviz" %}
{% set pypi_name = "graphviz" %}
{% set version = "0.21" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/graphviz/graphviz-{{ version }}.tar.gz
  sha256: 20743e7183be82aaaa8ad6c93f8893c923bd6658a04c32ee115edb3c8a835f78

build:
  number: 0
  skip: True  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - graphviz

test:
  files:
    - dask_test.py
  source_files:
    - tests
    - run-tests.py
  imports:
    - graphviz
    - graphviz.backend
    - graphviz.parameters
  requires:
    - pip
    - pytest
    - dask
    - pytest-mock
    - pytest-cov
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ pypi_name }}')=='{{ version }}')"
    - python dask_test.py
    - python run-tests.py -k "not test_deprecated_escape"  # [not osx]
    - python run-tests.py -k "not test_pipe and not test_render and not test_render_img and not test_render_outfile_differnt_parent and not test_subgraph_render"  # [osx]

about:
  home: https://github.com/xflr6/graphviz
  doc_url: https://graphviz.readthedocs.io/en/stable
  dev_url: https://github.com/xflr6/graphviz

  license: MIT
  license_family: MIT
  license_file: LICENSE.txt

  summary: Simple Python interface for Graphviz
  description: |
    This package facilitates the creation and rendering of graph
    descriptions in the DOT language of the Graphviz graph
    drawing software from Python.

extra:
  recipe-maintainers:
    - jakirkham
    - scopatz
