{% set version = "0.21" %}

package:
  name: python-graphviz
  version: {{ version }}

source:
  fn: python-graphviz-{{ version }}.zip
  url: https://pypi.io/packages/source/g/graphviz/graphviz-{{ version }}.tar.gz
  sha256: 20743e7183be82aaaa8ad6c93f8893c923bd6658a04c32ee115edb3c8a835f78

build:
  skip: true  # [py<38]
  number: 0
  script:
    - python -m pip install --no-deps --no-build-isolation --ignore-installed "{{SRC_DIR}}"

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - graphviz

test:
  source_files:
    - tests
  imports:
    - graphviz
  commands:
    - pip check
    - pytest tests -v  # [unix]
    - pytest tests -v -k "not test_pipe and not test_render and not test_render_img and not test_render_outfile_differnt_parent and not test_render_raises_before_save and not test_subgraph_render and not test_subgraph"  # [win]
  requires:
    - pip
    - dask
    - pytest
    - pytest-mock >=3
    - pytest-cov
    - coverage

about:
  home: https://github.com/xflr6/graphviz
  doc_url: https://graphviz.readthedocs.io
  dev_url: https://github.com/xflr6/graphviz

  license: MIT
  license_family: MIT
  license_file: LICENSE.txt

  summary: Simple Python interface for Graphviz
  description: |
    This package facilitates the creation and rendering of graph
    descriptions in the DOT language of the Graphviz graph
    drawing software from Python.

extra:
  recipe-maintainers:
    - jakirkham
    - scopatz
